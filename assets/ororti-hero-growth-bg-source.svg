  <desc>Photographic style marketing growth backdrop with a modern office interior, grid lines, rising charts, and upward arrows.</desc>
  <defs>
    <linearGradient id="bg" x1="142" y1="96" x2="1498" y2="1118" gradientUnits="userSpaceOnUse">
      <stop stop-color="#334046"/>
      <stop offset="0.46" stop-color="#202A2F"/>
      <stop offset="1" stop-color="#12171A"/>
    </linearGradient>
    <linearGradient id="glass" x1="824" y1="126" x2="1448" y2="728" gradientUnits="userSpaceOnUse">
      <stop stop-color="#9EB3BA" stop-opacity="0.18"/>
