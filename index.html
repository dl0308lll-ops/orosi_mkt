<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>오롯이 마케팅 | 메인</title>
  <meta
    name="description"
    content="레퍼런스 톤으로 구성한 오롯이 마케팅 메인 페이지입니다. ABOUT, SERVICES, SNS, CONTACT로 바로 이동할 수 있습니다."
  >
  <link rel="stylesheet" href="styles/site.css">
  <script defer src="scripts/site.js"></script>
</head>
<body class="home-page showcase-home">
  <div class="site-shell">
    <header class="site-header">
      <a class="brand showcase-brand" href="index.html" aria-label="오롯이 마케팅 메인">
        <img class="showcase-brand__logo" src="assets/ororti-logo-lockup.svg" alt="오롯이 마케팅">
      </a>
      <button class="nav-toggle" type="button" aria-expanded="false" aria-controls="site-nav">Menu</button>
      <nav class="site-nav" id="site-nav" aria-label="주요 메뉴">
        <a href="about.html" data-nav-link>ABOUT</a>
        <a href="services.html" data-nav-link>SERVICES</a>
        <a href="sns.html" data-nav-link>SNS</a>
        <a href="contact.html" data-nav-link>CONTACT</a>

      <section class="showcase-home__hero" aria-label="캠페인 스튜디오 인트로" data-growth-hero>

          <div class="showcase-home__scene">

            <div class="showcase-home__glow showcase-home__glow--one" aria-hidden="true"></div>

            <div class="showcase-home__glow showcase-home__glow--three" aria-hidden="true"></div>

            <div class="showcase-home__canvas-shell" aria-hidden="true">
              <canvas class="showcase-home__canvas" data-growth-canvas></canvas>
            </div>

            <div class="showcase-home__veil" aria-hidden="true"></div>

            <div class="showcase-home__caption" data-dna-copy>
              <div class="showcase-home__actions">
                <a class="showcase-home__cta" href="contact.html">문의하기</a>
              </div>
            </div>
          </div>
        </div>
      </section>
